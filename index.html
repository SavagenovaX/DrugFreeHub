<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DrugFreeHub - Admin and Student Edition By NeutronBlaze ⚡</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- AUTH SCREEN -->
<div id="auth-screen">
    <div id="auth-login-view" class="auth-card auth-form-view active">
        <h2 style="margin-bottom:4px;">DrugFreeHub Pro</h2>
        <p style="color:var(--text-muted); font-size:13px; margin-bottom:20px;">Select your access role to continue</p>
        <div class="role-toggle">
            <button class="role-btn active-role" id="role-btn-student" onclick="selectRole('student')">👨‍🎓 Student</button>
            <button class="role-btn admin-role"  id="role-btn-admin"   onclick="selectRole('admin')">🔐 Admin</button>
        </div>
        <div class="input-group">
            <label id="login-id-label">Membership ID</label>
            <input type="text" id="login-id" class="input-field" placeholder="e.g., DFH-7729-GH">
        </div>
        <div class="input-group" style="margin-bottom:20px;">
            <label>Security PIN</label>
            <input type="password" id="login-pin" class="input-field" placeholder="••••">
        </div>
        <button class="action-button" onclick="executePortalLogin()" style="margin-bottom:12px;">Verify & Enter</button>
        <button class="action-button secondary" onclick="switchAuthView('recover')" style="padding:10px; font-size:13px;">Forgot My Login Details</button>
    </div>

    <div id="auth-recover-view" class="auth-card auth-form-view">
        <h2>Account Recovery</h2>
        <p style="color:var(--text-muted); font-size:13px; margin-bottom:20px;">Enter your registered email to retrieve your credentials.</p>
        <div class="input-group">
            <label>Registered Email Address</label>
            <input type="email" id="recover-email" class="input-field" placeholder="student@school.edu.gh">
        </div>
        <button class="action-button" onclick="processAccountRecovery()" style="margin-bottom:12px;">Retrieve My Credentials</button>
        <div id="recovery-output-hint" class="recovery-hint-box"></div>
        <button class="action-button secondary" onclick="switchAuthView('login')" style="margin-top:12px; padding:10px; font-size:13px;">Back to Login</button>
    </div>
</div>

<!-- Paste the rest of your original HTML body content here (admin panel, student views, modals, drawer, header, bottom nav, etc.) from your original file -->

<script src="js/app.js"></script>
</body>
</html>
